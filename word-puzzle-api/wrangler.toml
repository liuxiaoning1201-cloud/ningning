name = "word-puzzle-api"
main = "src/index.ts"
compatibility_date = "2024-05-01"

[vars]
CORS_ORIGIN = "*"

[[d1_databases]]
binding = "DB"
database_name = "word-puzzle-db"
database_id = "placeholder-replace-with-actual-id"

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["GameRoom"]
