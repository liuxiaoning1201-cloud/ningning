<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>詩友記 PoetPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260308m">
</head>
<body>
  <div id="app">
    <!-- ===== 主頁面 Header ===== -->
    <header id="main-header">
      <div class="header-left">
        <a href="../" style="text-decoration:none;color:var(--text-light,#888);font-size:13px;margin-right:8px">←</a>
        <h1 class="app-title">詩友記</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-search" title="搜索">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
      </div>
    </header>

    <!-- ===== 聊天頁面 Header ===== -->
    <header id="chat-header" class="hidden">
      <button class="icon-btn" id="btn-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="chat-header-info">
        <span class="chat-poet-name"></span>
        <span class="chat-poet-subtitle"></span>
      </div>
      <button class="icon-btn" id="btn-poet-info">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </header>

    <!-- ===== 搜索欄 ===== -->
    <div id="search-bar" class="hidden">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="搜索詩人...">
      </div>
    </div>

    <!-- ===== 主內容區 ===== -->
    <main id="views">
      <!-- 聊天列表 -->
      <section id="view-chatlist" class="view active">
        <div id="chat-list"></div>
      </section>

      <!-- 聊天視圖 -->
      <section id="view-chat" class="view">
        <div id="messages"></div>
        <div id="chat-bottom">
          <div id="quick-actions"></div>
          <div id="chat-input-wrap">
            <input type="text" id="chat-input" placeholder="輸入訊息...">
            <button id="btn-send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- 動態/朋友圈 -->
      <section id="view-feed" class="view">
        <div id="stories-row"></div>
        <div id="feed-posts"></div>
      </section>

      <!-- 書院（文章展示）-->
      <section id="view-library" class="view">
        <div id="stage-tabs"></div>
        <div id="article-list"></div>
      </section>

      <!-- 書院文章閱讀 -->
      <section id="view-article" class="view">
        <div id="article-reader"></div>
      </section>

      <!-- 名人堂（詩人檢索）-->
      <section id="view-directory" class="view">
        <div id="dir-search-bar">
          <input type="text" id="dir-search" placeholder="搜索詩人姓名...">
        </div>
        <div id="dir-dynasty-tabs"></div>
        <div id="dir-poet-grid"></div>
      </section>

      <!-- 我的 -->
      <section id="view-profile" class="view">
        <div id="profile-content"></div>
      </section>
    </main>

    <!-- ===== 底部導航 ===== -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-view="chatlist">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>聊天</span>
      </button>
      <button class="nav-item" data-view="feed">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>動態</span>
      </button>
      <button class="nav-item" data-view="library">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span>書院</span>
      </button>
      <button class="nav-item" data-view="directory">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>名人堂</span>
      </button>
      <button class="nav-item" data-view="profile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>我的</span>
      </button>
    </nav>

    <!-- ===== 詩人資料 Modal ===== -->
    <div id="poet-modal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="btn-modal-close">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <script src="poets.js?v=20260308m"></script>
  <script src="articles.js?v=20260308p"></script>
  <script src="KS1_ANALYSIS.js?v=20260308m"></script>
  <script src="KS2_ANALYSIS.js?v=20260308m"></script>
  <script src="KS3_ANALYSIS.js?v=20260308m"></script>
  <script src="KS4_ANALYSIS.js?v=20260308m"></script>
  <script src="KS4_ANALYSIS_APPEND.js?v=20260308m"></script>
  <script src="JX_ANALYSIS.js?v=20260308p"></script>
  <script src="analysis_loader.js?v=20260308p"></script>
  <script src="app.js?v=20260308n"></script>
</body>
</html>
