<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>詞語配配樂</title>
  <link rel="stylesheet" href="./game.css" />
</head>
<body>
  <div class="stars-deco" style="top: 8%; left: 5%">✦</div>
  <div class="stars-deco" style="top: 20%; right: 8%; animation-delay: -2s">★</div>
  <div class="stars-deco" style="bottom: 15%; left: 12%; animation-delay: -4s">✧</div>

  <div class="app-wrap">
    <div class="top-bar">
      <h1>詞語配配樂 <span>點詞語，再點解釋</span></h1>
      <button type="button" class="btn-settings" id="btn-settings" aria-label="開啟設定">
        ⚙️ 設定
      </button>
    </div>
    <p class="level-progress" id="level-progress" hidden aria-live="polite"></p>
    <p class="hint" id="hint">先點左邊詞語或右邊解釋，再點另一邊配成一對！</p>
    <div class="board" id="board" aria-live="polite"></div>
  </div>

  <div class="level-complete-layer" id="level-complete-layer" hidden>
    <div class="win-box">
      <h2 id="level-complete-title">本關完成！</h2>
      <p id="level-complete-msg">即將進入下一關…</p>
    </div>
  </div>

  <div class="win-layer" id="win-layer" hidden>
    <div class="win-box">
      <h2 id="win-title">太棒了！</h2>
      <p id="win-msg">全部配對完成，要再玩一輪嗎？</p>
      <button type="button" class="btn-primary" id="btn-play-again">再玩一輪</button>
    </div>
  </div>

  <div
    class="modal-backdrop"
    id="settings-modal"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-title"
    aria-hidden="true"
  >
    <div class="modal" role="document">
      <h2 id="settings-title">教師設定</h2>
      <p class="sub">
        可<strong>手動輸入</strong>或<strong>匯入 Excel</strong>。文字格式：每行 <strong>詞語/解釋</strong>（只認第一個斜線）。Excel：第一欄詞語、第二欄起合併為解釋；或單欄內含「詞語/解釋」。
      </p>

      <div class="row-field excel-row">
        <label>從 Excel 匯入</label>
        <div class="excel-actions">
          <input type="file" id="excel-input" accept=".xlsx,.xls" hidden />
          <button type="button" class="btn-excel" id="btn-pick-excel">選擇 Excel 檔…</button>
          <span class="excel-filename" id="excel-filename" aria-live="polite"></span>
        </div>
        <div class="parse-hint excel-msg" id="excel-msg"></div>
      </div>

      <div class="row-field">
        <label for="bank-text">自訂題庫（可編輯匯入結果）</label>
        <textarea id="bank-text" spellcheck="false" placeholder="勇敢/不怕困難"></textarea>
        <div class="parse-hint" id="parse-hint"></div>
      </div>

      <div class="row-field level-mode-toggle">
        <label class="check-label">
          <input type="checkbox" id="level-mode" />
          啟用關卡模式（依序通關，完成一關後自動進入下一關）
        </label>
      </div>

      <div class="row-field" id="row-free-round">
        <label for="pairs-select">本輪要出幾組配對</label>
        <div class="pairs-row">
          <select id="pairs-select" aria-describedby="pairs-help"></select>
          <span id="pairs-help" style="font-size: 0.9rem; color: #636e72">畫面上會有「組數 × 2」張牌</span>
        </div>
      </div>

      <div class="row-field" id="row-level-settings" hidden>
        <label for="pairs-per-level">每一關出幾組配對</label>
        <div class="pairs-row">
          <select id="pairs-per-level" aria-describedby="level-pairs-help"></select>
          <span id="level-pairs-help" style="font-size: 0.9rem; color: #636e72">每關畫面上「組數 × 2」張牌</span>
        </div>
        <label for="total-levels" style="margin-top: 14px">總共幾關</label>
        <div class="pairs-row">
          <select id="total-levels" aria-describedby="total-levels-help"></select>
          <span id="total-levels-help" style="font-size: 0.9rem; color: #636e72"
            >實際關數會依題庫組數自動調整（不足時以最後一關較少組結束）</span
          >
        </div>
        <p class="parse-hint level-cap-hint" id="level-cap-hint"></p>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-save" id="btn-save-settings">儲存並重新發牌</button>
        <button type="button" class="btn-demo" id="btn-restore-demo">還原示範題庫</button>
        <button type="button" class="btn-close" id="btn-close-settings">關閉</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
