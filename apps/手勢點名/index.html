<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手勢點名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ffeef7 0%, #ffd6e8 50%, #ffc0d9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 可愛禮盒樣式 */
        .gift-box {
            width: 200px;
            height: 200px;
            position: relative;
            margin: 40px auto;
            cursor: pointer;
        }

        /* 禮盒主體 */
        .box-body {
            width: 180px;
            height: 140px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            border-radius: 20px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* 禮盒蓋子 */
        .box-lid {
            width: 200px;
            height: 60px;
            background: linear-gradient(135deg, #ff8fab 0%, #ffb3c6 100%);
            border-radius: 20px 20px 10px 10px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: bottom center;
        }

        /* 禮盒打開狀態 */
        .gift-box.opened .box-lid {
            transform: translateX(-50%) rotateX(-120deg);
            opacity: 0.7;
        }

        .gift-box.opened .box-body {
            transform: translateX(-50%) scaleY(1.1);
        }

        /* 禮盒表情 */
        .box-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 100px;
        }

        .eye {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            animation: blink 3s infinite;
        }

        .eye.left { left: 30px; }
        .eye.right { right: 30px; }

        .eye::after {
            content: '';
            width: 12px;
            height: 12px;
            background: #ff1744;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
        }

        .mouth {
            width: 40px;
            height: 20px;
            border: 4px solid #fff;
            border-top: none;
            border-radius: 0 0 40px 40px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 跳動動畫 */
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .gift-box:not(.opened) {
            animation: jump 1.5s ease-in-out infinite;
        }

        /* 眨眼動畫 */
        @keyframes blink {
            0%, 90%, 100% { height: 20px; }
            95% { height: 2px; }
        }

        /* 姓名顯示 */
        .name-display {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            color: #ff1744;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: opacity 0.5s ease;
            white-space: nowrap;
            z-index: 10;
        }

        .name-display.show {
            opacity: 1;
            animation: float 5s ease-in-out forwards;
        }

        @keyframes float {
            0% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-20px); }
            100% { transform: translateX(-50%) translateY(0); opacity: 0; }
        }

        /* 攝像頭預覽 - 右下角小視窗 */
        .video-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
            border: 3px solid rgba(255, 107, 157, 0.5);
            background: #000;
        }

        .video-container.active {
            display: block;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .hand-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(255, 0, 0, 0.7);
            color: white;
        }

        .hand-indicator.detected {
            background: rgba(0, 255, 0, 0.7);
        }

        /* 按鈕樣式 */
        .btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.5);
        }

        .btn:active { transform: translateY(0); }
        .btn-secondary { background: linear-gradient(135deg, #ffb3c6 0%, #ffc0d9 100%); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 卡片樣式 */
        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            margin: 20px;
        }

        h1 {
            color: #ff1744;
            font-size: 42px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        h2 {
            color: #ff6b9d;
            font-size: 28px;
            text-align: center;
            margin-bottom: 20px;
        }

        .settings-container { display: none; }
        .settings-container.active { display: block; }
        .game-container { display: block; }
        .game-container.hidden { display: none; }

        .name-input-area { margin: 20px 0; }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 3px solid #ffb3c6;
            border-radius: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #ff6b9d;
        }

        .name-list {
            margin-top: 20px;
            padding: 15px;
            background: #fff5f8;
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .name-item {
            display: inline-block;
            background: linear-gradient(135deg, #ffb3c6 0%, #ffc0d9 100%);
            color: #ff1744;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
            font-weight: bold;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .status-message.info { background: #e3f2fd; color: #1976d2; }
        .status-message.success { background: #e8f5e9; color: #388e3c; }
        .status-message.warning { background: #fff3e0; color: #f57c00; }
        .status-message.error { background: #ffebee; color: #c62828; }

        @media (max-width: 640px) {
            .gift-box { width: 150px; height: 150px; }
            .box-body { width: 135px; height: 105px; }
            .box-lid { width: 150px; height: 45px; }
            h1 { font-size: 32px; }
            .card { padding: 20px; }
            .video-container { width: 150px; height: 112px; }
        }
    </style>
</head>
<body>
    <!-- 遊戲主頁面 -->
    <div id="game-container" class="game-container">
        <div class="card">
            <h1>🎁 手勢點名系統</h1>
            
            <div class="gift-box" id="gift-box">
                <div class="name-display" id="name-display"></div>
                <div class="box-lid"></div>
                <div class="box-body">
                    <div class="box-face">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
            </div>

            <div id="status-message" class="status-message info">
                點擊下方按鈕開始點名
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="start-camera-btn">📷 開啟攝像頭</button>
                <button class="btn btn-secondary" id="settings-btn">⚙️ 名單設置</button>
            </div>
            
            <div style="text-align: center; margin-top: 15px;">
                <button class="btn btn-secondary" id="reset-btn" style="padding: 10px 20px; font-size: 14px;">🔄 重置抽取記錄</button>
                <p id="remaining-count" style="margin-top: 10px; color: #666; font-size: 14px;">尚未載入名單</p>
            </div>
            
            <p style="text-align: center; margin-top: 10px; color: #999; font-size: 14px;">
                💡 提示：點擊禮盒也可以直接抽選
            </p>
        </div>
    </div>

    <!-- 攝像頭視窗 -->
    <div class="video-container" id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="hand-indicator" id="hand-indicator">未偵測</div>
    </div>

    <!-- 設置頁面 -->
    <div id="settings-container" class="settings-container">
        <div class="card">
            <h2>📝 名單設置</h2>
            
            <div class="name-input-area">
                <textarea id="name-input" placeholder="請輸入學生名單，每行一個名字&#10;例如：&#10;小明&#10;小華&#10;小美"></textarea>
            </div>

            <div style="text-align: center;">
                <button class="btn" id="save-names-btn">💾 儲存名單</button>
                <button class="btn btn-secondary" id="back-btn">↩️ 返回</button>
            </div>

            <div class="name-list" id="name-list">
                <p style="text-align: center; color: #999;">尚無名單</p>
            </div>
        </div>
    </div>

    <script>
        // ===== 全局變數 =====
        let stream = null;
        let isBoxOpened = false;
        let lastTriggerTime = 0;
        const TRIGGER_COOLDOWN = 3000;
        const AUTO_CLOSE_DELAY = 5000;
        let nameList = [];
        let remainingNames = []; // 尚未被抽取的學生名單
        let autoCloseTimer = null;
        let handDetectionInterval = null;

        // ===== 音效 =====
        const wowSound = new Audio('wow-171498.mp3');
        wowSound.volume = 0.8;

        // ===== DOM 元素 =====
        const gameContainer = document.getElementById('game-container');
        const settingsContainer = document.getElementById('settings-container');
        const giftBox = document.getElementById('gift-box');
        const nameDisplay = document.getElementById('name-display');
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('video-container');
        const handIndicator = document.getElementById('hand-indicator');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const saveNamesBtn = document.getElementById('save-names-btn');
        const backBtn = document.getElementById('back-btn');
        const nameInput = document.getElementById('name-input');
        const nameListEl = document.getElementById('name-list');
        const statusMessage = document.getElementById('status-message');

        // ===== 狀態更新 =====
        function updateStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
        }

        // ===== 攝像頭控制 =====
        async function startCamera() {
            if (nameList.length === 0) {
                alert('請先在設置頁面添加學生名單！');
                return;
            }

            try {
                updateStatus('正在開啟攝像頭...', 'info');
                startCameraBtn.disabled = true;
                startCameraBtn.textContent = '開啟中...';

                // 使用原生 API 請求攝像頭
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    },
                    audio: false
                });

                video.srcObject = stream;
                await video.play();

                videoContainer.classList.add('active');
                startCameraBtn.textContent = '🛑 關閉攝像頭';
                startCameraBtn.disabled = false;
                
                updateStatus('攝像頭已開啟！將手掌放入畫面中觸發點名', 'success');

                // 開始手部偵測（使用簡單的動態檢測）
                startHandDetection();

            } catch (error) {
                console.error('攝像頭錯誤:', error);
                let errorMsg = '無法開啟攝像頭';
                
                if (error.name === 'NotAllowedError') {
                    errorMsg = '請允許使用攝像頭權限';
                } else if (error.name === 'NotFoundError') {
                    errorMsg = '找不到攝像頭設備';
                } else if (error.name === 'NotReadableError') {
                    errorMsg = '攝像頭被其他應用程式佔用';
                }
                
                updateStatus(errorMsg, 'error');
                startCameraBtn.textContent = '📷 開啟攝像頭';
                startCameraBtn.disabled = false;
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            videoContainer.classList.remove('active');
            startCameraBtn.textContent = '📷 開啟攝像頭';
            
            if (handDetectionInterval) {
                clearInterval(handDetectionInterval);
                handDetectionInterval = null;
            }
            
            updateStatus('點擊下方按鈕開始點名', 'info');
        }

        function toggleCamera() {
            if (stream) {
                stopCamera();
            } else {
                startCamera();
            }
        }

        // ===== 簡單動態檢測（基於畫面變化） =====
        let lastImageData = null;
        let motionCount = 0;
        const MOTION_THRESHOLD = 30;
        const MOTION_FRAMES_NEEDED = 5;

        function startHandDetection() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 160;
            canvas.height = 120;

            handDetectionInterval = setInterval(() => {
                if (!video.videoWidth) return;

                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                if (lastImageData) {
                    let diffCount = 0;
                    const threshold = 30;

                    // 只檢測中間區域（更可能是手的位置）
                    const startX = Math.floor(canvas.width * 0.2);
                    const endX = Math.floor(canvas.width * 0.8);
                    const startY = Math.floor(canvas.height * 0.2);
                    const endY = Math.floor(canvas.height * 0.8);

                    for (let y = startY; y < endY; y++) {
                        for (let x = startX; x < endX; x++) {
                            const i = (y * canvas.width + x) * 4;
                            const diff = Math.abs(data[i] - lastImageData[i]) +
                                        Math.abs(data[i + 1] - lastImageData[i + 1]) +
                                        Math.abs(data[i + 2] - lastImageData[i + 2]);
                            if (diff > threshold) {
                                diffCount++;
                            }
                        }
                    }

                    const totalPixels = (endX - startX) * (endY - startY);
                    const motionPercent = (diffCount / totalPixels) * 100;

                    // 檢測顯著的動作（5% - 40% 的畫面變化）
                    if (motionPercent > 5 && motionPercent < 40) {
                        motionCount++;
                        handIndicator.textContent = '偵測中...';
                        handIndicator.classList.add('detected');

                        if (motionCount >= MOTION_FRAMES_NEEDED) {
                            const currentTime = Date.now();
                            if (!isBoxOpened && (currentTime - lastTriggerTime) >= TRIGGER_COOLDOWN) {
                                handIndicator.textContent = '已觸發！';
                                openGiftBox();
                                lastTriggerTime = currentTime;
                                motionCount = 0;
                            }
                        }
                    } else {
                        motionCount = Math.max(0, motionCount - 1);
                        if (motionCount === 0) {
                            handIndicator.textContent = '等待動作';
                            handIndicator.classList.remove('detected');
                        }
                    }
                }

                lastImageData = new Uint8ClampedArray(data);
            }, 100);
        }

        // ===== 禮盒控制 =====
        function openGiftBox() {
            if (nameList.length === 0) {
                updateStatus('請先在設置頁面添加學生名單！', 'warning');
                return;
            }

            // 如果所有學生都已抽取過，重置名單
            if (remainingNames.length === 0) {
                remainingNames = [...nameList];
                // 使用 Fisher-Yates 洗牌算法打亂順序
                for (let i = remainingNames.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [remainingNames[i], remainingNames[j]] = [remainingNames[j], remainingNames[i]];
                }
            }

            isBoxOpened = true;
            giftBox.classList.add('opened');
            
            // 從尚未抽取的名單中取出一個
            const randomName = remainingNames.pop();
            nameDisplay.textContent = randomName;
            nameDisplay.classList.add('show');

            // 播放音效
            wowSound.currentTime = 0;
            wowSound.play().catch(e => console.log('音效播放失敗:', e));

            triggerConfetti();
            
            // 顯示剩餘人數
            const remaining = remainingNames.length;
            const total = nameList.length;
            updateStatus(`🎉 恭喜 ${randomName} 被選中！（剩餘 ${remaining}/${total} 人）`, 'success');

            if (autoCloseTimer) clearTimeout(autoCloseTimer);

            autoCloseTimer = setTimeout(() => {
                closeGiftBox();
            }, AUTO_CLOSE_DELAY);
        }

        function closeGiftBox() {
            isBoxOpened = false;
            giftBox.classList.remove('opened');
            nameDisplay.classList.remove('show');
            
            // 更新剩餘人數顯示
            const remainingCountEl = document.getElementById('remaining-count');
            if (remainingCountEl) {
                if (nameList.length === 0) {
                    remainingCountEl.textContent = '尚未載入名單';
                } else {
                    remainingCountEl.textContent = `剩餘 ${remainingNames.length} / ${nameList.length} 位學生`;
                }
            }
            
            if (stream) {
                updateStatus('攝像頭已開啟！將手掌放入畫面中觸發點名', 'success');
            } else {
                updateStatus('點擊下方按鈕開始點名', 'info');
            }
            
            if (autoCloseTimer) {
                clearTimeout(autoCloseTimer);
                autoCloseTimer = null;
            }
        }

        // ===== Confetti 特效 =====
        function triggerConfetti() {
            if (typeof confetti === 'undefined') return;

            const duration = 3000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };

            const interval = setInterval(() => {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti({
                    ...defaults,
                    particleCount,
                    origin: { x: Math.random(), y: Math.random() - 0.2 }
                });
            }, 250);
        }

        // ===== 名單管理 =====
        function loadNameList() {
            const saved = localStorage.getItem('nameList');
            if (saved) {
                nameList = JSON.parse(saved);
                remainingNames = [...nameList]; // 初始化未抽取名單
                // 打亂順序
                for (let i = remainingNames.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [remainingNames[i], remainingNames[j]] = [remainingNames[j], remainingNames[i]];
                }
                updateNameListDisplay();
                nameInput.value = nameList.join('\n');
            }
        }

        function saveNameList() {
            const text = nameInput.value.trim();
            if (!text) {
                alert('請輸入至少一個名字！');
                return;
            }

            nameList = text.split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);

            // 重置未抽取名單並打亂順序
            remainingNames = [...nameList];
            for (let i = remainingNames.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [remainingNames[i], remainingNames[j]] = [remainingNames[j], remainingNames[i]];
            }

            localStorage.setItem('nameList', JSON.stringify(nameList));
            updateNameListDisplay();
            alert(`成功儲存 ${nameList.length} 個名字！`);
        }
        
        // 重置抽取記錄（手動重置）
        function resetPickedNames() {
            remainingNames = [...nameList];
            for (let i = remainingNames.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [remainingNames[i], remainingNames[j]] = [remainingNames[j], remainingNames[i]];
            }
            updateStatus(`已重置！共 ${nameList.length} 位學生等待抽取`, 'info');
        }

        function updateNameListDisplay() {
            if (nameList.length === 0) {
                nameListEl.innerHTML = '<p style="text-align: center; color: #999;">尚無名單</p>';
            } else {
                nameListEl.innerHTML = nameList.map(name => 
                    `<span class="name-item">${name}</span>`
                ).join('');
            }
        }

        // ===== 頁面切換 =====
        function showSettings() {
            gameContainer.classList.add('hidden');
            settingsContainer.classList.add('active');
            stopCamera();
        }

        function showGame() {
            settingsContainer.classList.remove('active');
            gameContainer.classList.remove('hidden');
        }

        // ===== 事件監聽器 =====
        const resetBtn = document.getElementById('reset-btn');
        const remainingCountEl = document.getElementById('remaining-count');

        startCameraBtn.addEventListener('click', toggleCamera);
        settingsBtn.addEventListener('click', showSettings);
        saveNamesBtn.addEventListener('click', saveNameList);
        backBtn.addEventListener('click', showGame);
        resetBtn.addEventListener('click', () => {
            resetPickedNames();
            updateRemainingCount();
        });

        // 點擊禮盒直接觸發
        giftBox.addEventListener('click', () => {
            const currentTime = Date.now();
            if (!isBoxOpened && (currentTime - lastTriggerTime) >= TRIGGER_COOLDOWN) {
                openGiftBox();
                lastTriggerTime = currentTime;
            }
        });

        // 更新剩餘人數顯示
        function updateRemainingCount() {
            if (nameList.length === 0) {
                remainingCountEl.textContent = '尚未載入名單';
            } else {
                remainingCountEl.textContent = `剩餘 ${remainingNames.length} / ${nameList.length} 位學生`;
            }
        }

        // ===== 初始化 =====
        loadNameList();
        updateRemainingCount();
    </script>
    <script src="/auth-widget.js"></script>
</body>
</html>
