<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>詩人的朋友圈</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf9f6;
      --warm-beige: #f5f3f0;
      --soft-gray: #e8e6e3;
      --accent: #c4a77d;
      --accent-dark: #8b7355;
      --text: #5a4a3a;
      --paper: #f8f6f3;
      --ink: #2c2419;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #faf9f6 0%, #f0ede8 100%);
      min-height: 100vh;
      color: var(--text);
    }
    .app-header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 20px 24px;
      border-bottom: 1px solid rgba(196,167,125,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.5rem;
      color: var(--ink);
    }
    .nav-tabs {
      display: flex;
      gap: 8px;
    }
    .nav-tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    .nav-tab:hover { background: var(--soft-gray); }
    .nav-tab.active {
      background: var(--accent);
      color: white;
    }
    .back-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent-dark);
      cursor: pointer;
      font-size: 0.9rem;
      display: none;
    }
    .back-btn.visible { display: inline-block; }
    .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .page { display: none; }
    .page.active { display: block; }

    /* 首頁 */
    .home-intro {
      text-align: center;
      margin-bottom: 40px;
    }
    .home-intro h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.8rem;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .home-intro p { color: var(--accent-dark); opacity: 0.9; }
    .home-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .home-card {
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 32px;
      cursor: pointer;
      border: 1px solid rgba(196,167,125,0.3);
      transition: all 0.3s;
      text-align: center;
    }
    .home-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(90,74,58,0.12);
      border-color: var(--accent);
    }
    .home-card-icon { font-size: 3rem; margin-bottom: 16px; }
    .home-card h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--ink); }
    .home-card p { font-size: 0.9rem; color: var(--accent-dark); opacity: 0.8; }

    /* 作者列表 */
    .filter-bar {
      padding: 12px 0;
      margin-bottom: 20px;
    }
    .filter-bar select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--soft-gray);
      background: white;
      font-size: 0.95rem;
      color: var(--text);
    }
    .author-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    .author-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(196,167,125,0.2);
      transition: all 0.3s;
    }
    .author-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(90,74,58,0.1);
    }
    .author-avatar {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--warm-beige), var(--soft-gray));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-family: 'Noto Serif TC', serif;
    }
    .author-card .name { font-weight: 500; font-size: 1rem; }
    .author-card .era { font-size: 0.8rem; color: var(--accent-dark); opacity: 0.8; }

    /* 聊天區域 */
    .chat-layout {
      display: flex;
      gap: 24px;
      height: calc(100vh - 180px);
      min-height: 400px;
    }
    .chat-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: white;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(196,167,125,0.2);
      overflow-y: auto;
    }
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 16px;
      border: 1px solid rgba(196,167,125,0.2);
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--soft-gray);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .chat-header .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--warm-beige), var(--soft-gray));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-family: 'Noto Serif TC', serif;
    }
    .chat-header .info h3 { font-size: 1.1rem; }
    .chat-header .info h3 { font-size: 0.9rem; color: var(--accent-dark); opacity: 0.8; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
            font-size: 0.95rem;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.author {
      align-self: flex-start;
      background: var(--warm-beige);
      color: var(--ink);
      border-bottom-left-radius: 4px;
    }
    .chat-msg .author-name { font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; }
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--soft-gray);
      display: flex;
      gap: 12px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid var(--soft-gray);
      font-size: 0.95rem;
      font-family: inherit;
    }
    .chat-input-area input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .chat-input-area button {
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.3s;
    }
    .chat-input-area button:hover { background: var(--accent-dark); }
    .chat-input-area button:disabled {
      background: var(--soft-gray);
      cursor: not-allowed;
      opacity: 0.7;
    }
    .chat-loading { text-align: center; padding: 20px; color: var(--accent-dark); opacity: 0.8; }

    /* 朋友圈 */
    .moments-layout {
      flex-direction: column;
      gap: 24px;
    }
    .post-btn {
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
      margin-bottom: 20px;
      transition: background 0.3s;
    }
    .post-btn:hover { background: var(--accent-dark); }
    .moment-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(196,167,125,0.2);
      overflow: hidden;
    }
    .moment-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .moment-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--warm-beige), var(--soft-gray));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-family: 'Noto Serif TC', serif;
    }
    .moment-header .name { font-weight: 600; margin-bottom: 2px; }
    .moment-header .meta { font-size: 0.85rem; color: var(--accent-dark); opacity: 0.8; }
    .moment-content {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }
    .moment-actions {
      display: flex;
      gap: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--soft-gray);
    }
    .moment-action {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--accent-dark);
      transition: color 0.3s;
    }
    .moment-action:hover { color: var(--accent); }
    .moment-action.liked { color: #c45c5c; }
    .moment-comments {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px dashed var(--soft-gray);
    }
    .moment-comment {
      padding: 8px 0;
      font-size: 0.9rem;
      color: var(--text);
    }
    .moment-comment .author { font-weight: 600; margin-right: 8px; color: var(--accent-dark); }

    /* 發文彈窗 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 20px; font-size: 1.2rem; }
    .modal select, .modal textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--soft-gray);
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 16px;
    }
    .modal textarea { min-height: 120px; resize: vertical; }
    .modal .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .modal .modal-actions button {
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .modal .modal-actions .cancel {
      background: var(--soft-gray);
      color: var(--text);
    }
    .modal .modal-actions .submit {
      background: var(--accent);
      color: white;
    }
    .modal .modal-actions .submit:hover { background: var(--accent-dark); }

    @media (max-width: 768px) {
      .chat-layout { flex-direction: column; height: auto; }
      .chat-sidebar { width: 100%; max-height: 200px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">詩人的朋友圈</h1>
    <button class="back-btn" id="backBtn">← 返回</button>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-page="home">首頁</button>
      <button class="nav-tab" data-page="chat">與作者聊天</button>
      <button class="nav-tab" data-page="moments">作者朋友圈</button>
    </nav>
  </header>

  <main class="main-content">
    <!-- 首頁 -->
    <section class="page active" id="page-home">
      <div class="home-intro">
        <h2>與古典文學作者對話</h2>
        <p>基於香港教育局建議篇章，與 20 位核心作者聊天，或扮演他們發朋友圈</p>
      </div>
      <div class="home-cards">
        <div class="home-card" data-page="chat">
          <div class="home-card-icon">💬</div>
          <h3>與作者聊天</h3>
          <p>向李白、杜甫、蘇軾等作者提問，獲取詩詞與文言知識</p>
        </div>
        <div class="home-card" data-page="moments">
          <div class="home-card-icon">📜</div>
          <h3>作者朋友圈</h3>
          <p>扮演作者發送日常動態，體驗古典文學之美</p>
        </div>
      </div>
    </section>

    <!-- 與作者聊天 -->
    <section class="page" id="page-chat">
      <div class="filter-bar">
        <select id="stageFilter">
          <option value="">全部學習階段</option>
          <option value="1">小一至小三</option>
          <option value="2">小四至小六</option>
          <option value="3">中一至中三</option>
          <option value="4">中四至中六</option>
        </select>
      </div>
      <div class="chat-layout">
        <aside class="chat-sidebar">
          <div class="author-grid" id="authorList"></div>
        </aside>
        <div class="chat-main">
          <div class="chat-header" id="chatHeader" style="display:none;">
            <div class="avatar" id="chatAvatar">李</div>
            <div class="info">
              <h3 id="chatAuthorName">李白</h3>
              <p id="chatAuthorEra">唐 · 詩仙</p>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages">
            <p class="chat-loading" id="chatPlaceholder">請先從左側選擇一位作者開始對話</p>
          </div>
          <div class="chat-input-area" id="chatInputArea" style="display:none;">
            <input type="text" id="chatInput" placeholder="輸入你的問題..." maxlength="500">
            <button id="chatSendBtn">發送</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 作者朋友圈 -->
    <section class="page" id="page-moments">
      <button class="post-btn" id="postBtn">✏️ 發文</button>
      <div class="filter-bar">
        <select id="momentsStageFilter">
          <option value="">全部學習階段</option>
          <option value="1">小一至小三</option>
          <option value="2">小四至小六</option>
          <option value="3">中一至中三</option>
          <option value="4">中四至中六</option>
        </select>
      </div>
      <div class="moments-layout" id="momentsList"></div>
    </section>
  </main>

  <!-- 評論彈窗 -->
  <div class="modal-overlay" id="commentModal">
    <div class="modal">
      <h3>寫評論</h3>
      <label>以誰的身份評論</label>
      <select id="commentAuthor">
        <option value="">請選擇</option>
      </select>
      <label>評論內容</label>
      <textarea id="commentText" placeholder="輸入評論..."></textarea>
      <div class="modal-actions">
        <button class="cancel" id="commentCancel">取消</button>
        <button class="submit" id="commentSubmit">發布</button>
      </div>
    </div>
  </div>

  <!-- 發文彈窗 -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <h3>發文</h3>
      <label>選擇作者</label>
      <select id="postAuthor">
        <option value="">請選擇</option>
      </select>
      <p id="postAuthorHint" style="font-size:0.85rem;color:var(--accent-dark);margin:-8px 0 12px;opacity:0.8;"></p>
      <label>發文內容（建議引用建議篇章中的詩句，注意用語規範）</label>
      <textarea id="postContent" placeholder="輸入內容..." maxlength="500"></textarea>
      <div class="modal-actions">
        <button class="cancel" id="postCancel">取消</button>
        <button class="submit" id="postSubmit">發布</button>
      </div>
    </div>
  </div>

  <script src="data/authors.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
