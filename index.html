<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字遊空間</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --cream-white: #f8f9f6;
            --warm-beige: #f0f2ee;
            --soft-gray: #e4e6e2;
            --accent: #6b7c6f;
            --accent-light: #9aa89c;
            --dark-brown: #4a5c4a;
            --text-dark: #3d4a3d;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #f8f9f6 0%, #f2f4f0 45%, #eef0eb 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* 背景裝飾元素 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(107, 124, 111, 0.06) 0%, transparent 45%);
            animation: float 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 70%, rgba(154, 168, 156, 0.05) 0%, transparent 45%);
            animation: float 25s ease-in-out infinite reverse;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 標題區域 */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: 0.1em;
            position: relative;
            display: inline-block;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
            animation: expandLine 1s ease-out 0.5s both;
        }

        @keyframes expandLine {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 1; }
        }

        .header p {
            font-size: 1.1rem;
            color: var(--dark-brown);
            font-weight: 300;
            margin-top: 25px;
            opacity: 0.8;
        }

        /* 軟件網格 */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        /* 軟件卡片 */
        .app-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(107, 124, 111, 0.2);
            box-shadow: 0 8px 32px rgba(61, 74, 61, 0.06);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .app-card:nth-child(1) { animation-delay: 0.1s; }
        .app-card:nth-child(2) { animation-delay: 0.2s; }
        .app-card:nth-child(3) { animation-delay: 0.3s; }
        .app-card:nth-child(4) { animation-delay: 0.4s; }
        .app-card:nth-child(5) { animation-delay: 0.5s; }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .app-card:hover::before {
            left: 100%;
        }

        .app-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 48px rgba(61, 74, 61, 0.12);
            border-color: var(--accent);
        }

        .app-card:active {
            transform: translateY(-4px) scale(1.01);
        }

        /* 圖標容器 */
        .app-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--warm-beige) 0%, var(--soft-gray) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .app-card:hover .app-icon {
            transform: rotate(5deg) scale(1.1);
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--soft-gray) 100%);
        }

        .app-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .app-card:hover .app-icon::after {
            opacity: 1;
            animation: shine 1s ease-out;
        }

        @keyframes shine {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 標題 */
        .app-title {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        .app-card:hover .app-title {
            color: var(--dark-brown);
        }

        /* 描述 */
        .app-description {
            font-size: 0.95rem;
            color: var(--dark-brown);
            opacity: 0.7;
            line-height: 1.6;
            margin-top: 8px;
        }

        /* 動畫定義 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .apps-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .app-card {
                padding: 25px 20px;
            }
        }

        /* 載入動畫 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .loading {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>字遊空間</h1>
            <p>在文字世界裡自由遊戲</p>
        </div>

        <div class="apps-grid">
            <div class="app-card" onclick="window.location.href='字詞地鼠戰/字詞地鼠戰.html'">
                <div class="app-icon">🎯</div>
                <h2 class="app-title">字詞地鼠戰</h2>
                <p class="app-description">趣味字詞學習遊戲<br>通過打地鼠的方式練習字詞</p>
            </div>

            <div class="app-card" onclick="window.location.href='手勢點名/index.html'">
                <div class="app-icon">✋</div>
                <h2 class="app-title">手勢點名系統</h2>
                <p class="app-description">創新的手勢互動點名<br>讓點名變得更有趣</p>
            </div>

            <div class="app-card" onclick="window.location.href='班級守護隊/index.html'">
                <div class="app-icon">🐾</div>
                <h2 class="app-title">班級守護隊</h2>
                <p class="app-description">小組加減分與班級管理<br>動物主題、任務徽章、有效學習紀錄</p>
            </div>

            <div class="app-card" onclick="window.location.href='春江花月夜/春江花月夜.html'">
                <div class="app-icon">🌙</div>
                <h2 class="app-title">春江花月夜</h2>
                <p class="app-description">手勢互動詩詞體驗<br>感受古典詩詞之美</p>
            </div>

            <div class="app-card" onclick="window.location.href='crossword/index.html'">
                <div class="app-icon">📝</div>
                <h2 class="app-title">中文填字接龍</h2>
                <p class="app-description">詩句填字練習<br>縱橫交錯填寫古詩詞</p>
            </div>

            <div class="app-card" onclick="window.location.href='poetpal/index.html'">
                <div class="app-icon">🏯</div>
                <h2 class="app-title">詩友記</h2>
                <p class="app-description">穿越時空與詩人聊天<br>50+ 位詩人等你來對話</p>
            </div>
        </div>
    </div>

    <script>
        // 添加點擊動畫效果
        document.querySelectorAll('.app-card').forEach(card => {
            card.addEventListener('click', function(e) {
                // 創建波紋效果
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    border-radius: 50%;
                    background: rgba(107, 124, 111, 0.25);
                    transform: scale(0);
                    animation: ripple 0.6s ease-out;
                    pointer-events: none;
                `;
                
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // 添加波紋動畫樣式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 頁面載入完成後的動畫
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.5s ease-in';
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
    <script src="/auth-widget.js"></script>
</body>
</html>
