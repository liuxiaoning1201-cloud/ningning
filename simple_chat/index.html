<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>與孟子聊天</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 560px; margin: 0 auto; min-height: 100vh; background: #faf9f6; }
    h1 { margin-bottom: 20px; font-size: 1.3rem; color: #5a4a3a; }
    #messages { min-height: 280px; margin-bottom: 16px; }
    .msg { padding: 12px 16px; margin-bottom: 10px; border-radius: 14px; max-width: 88%; line-height: 1.5; }
    .user { background: #c4a77d; color: #fff; margin-left: auto; }
    .ai { background: #fff; border: 1px solid #e8e6e3; color: #2c2419; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #e8e6e3; border-radius: 12px; font-size: 1rem; }
    button { margin-top: 10px; padding: 12px 28px; background: #8b7355; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #7a6348; }
  </style>
</head>
<body>
  <h1>與孟子聊天</h1>
  <div id="messages"></div>
  <input id="input" placeholder="輸入訊息..." />
  <button onclick="send()">發送</button>

  <script>
    const KEY = 'sk-a082925b9cb644449be8fa0e54a8f46c';
    const SYSTEM = '你是孟子，先秦儒家代表人物。用第一人稱、簡潔親切地與學生對話，可引用《二子學弈》《論四端》等作品。';
    const messages = [];
    const API = 'https://api.deepseek.com/v1/chat/completions';
    const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API);

    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      messages.push({ role: 'user', content: text });
      addMsg(text, 'user');

      const msgs = [{ role: 'system', content: SYSTEM }, ...messages];
      addMsg('思考中...', 'ai', true);
      try {
        const r = await fetch(PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
          body: JSON.stringify({ model: 'deepseek-chat', messages: msgs, max_tokens: 1024 })
        });
        const data = await r.json();
        document.querySelector('.ai.loading')?.remove();
        if (data.error) throw new Error(data.error?.message || JSON.stringify(data.error));
        const reply = data.choices?.[0]?.message?.content || '';
        messages.push({ role: 'assistant', content: reply });
        addMsg(reply, 'ai');
      } catch (e) {
        document.querySelector('.ai.loading')?.remove();
        addMsg('錯誤：' + e.message + '（若為 CORS，請用 server.py 啟動）', 'ai');
      }
    }
    document.getElementById('input').onkeydown = e => { if (e.key === 'Enter') send(); };

    function addMsg(text, who, loading) {
      const d = document.createElement('div');
      d.className = 'msg ' + who + (loading ? ' loading' : '');
      d.textContent = text;
      document.getElementById('messages').appendChild(d);
      d.scrollIntoView();
    }
  </script>
</body>
</html>
