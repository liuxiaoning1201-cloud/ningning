<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 助手 - 軟件中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf9f6;
      --warm-beige: #f5f3f0;
      --soft-gray: #e8e6e3;
      --accent: #c4a77d;
      --accent-dark: #8b7355;
      --text: #5a4a3a;
      --ink: #2c2419;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #faf9f6 0%, #f0ede8 100%);
      min-height: 100vh;
      color: var(--text);
    }
    .header {
      background: rgba(255,255,255,0.95);
      padding: 16px 24px;
      border-bottom: 1px solid rgba(196,167,125,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 1.25rem; color: var(--ink); }
    .back-link {
      color: var(--accent-dark);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 120px);
    }
    .api-config {
      background: #fff8e7;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .api-config input {
      width: 100%;
      padding: 8px 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid var(--soft-gray);
    }
    .api-config .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .api-config button {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent-dark);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .api-config button:hover { background: var(--warm-beige); }
    .status { font-size: 0.85rem; margin-left: 8px; }
    .status.ok { color: #2e7d32; }
    .status.err { color: #c45c5c; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid rgba(196,167,125,0.3);
      color: var(--ink);
      border-bottom-left-radius: 4px;
    }
    .msg .role { font-size: 0.8rem; opacity: 0.8; margin-bottom: 4px; }
    .input-area {
      display: flex;
      gap: 12px;
      padding: 16px 0;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid var(--soft-gray);
      font-size: 0.95rem;
      font-family: inherit;
    }
    .input-area input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .input-area button {
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .input-area button:hover { background: var(--accent-dark); }
    .input-area button:disabled {
      background: var(--soft-gray);
      cursor: not-allowed;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>AI 助手</h1>
    <a href="../index.html" class="back-link">← 返回軟件中心</a>
  </header>

  <div class="chat-container">
    <div class="api-config">
      <strong>API 設定</strong>
      <p style="margin-top:4px;font-size:0.85rem;opacity:0.9;">請輸入後端網址（需先執行 node launch.js 或 node server.js）</p>
      <input type="text" id="apiUrl" placeholder="http://localhost:3001">
      <div class="row">
        <button id="testBtn">測試連線</button>
        <span id="status" class="status"></span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg assistant">
        <div class="role">AI 助手</div>
        你好！我是軟件中心的 AI 助手，可以協助你解答學習問題、詩詞文言、或軟件使用上的疑問。請先設定 API 網址並點擊「測試連線」，確認成功後即可開始對話。
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="輸入你的問題..." maxlength="500">
      <button id="sendBtn">發送</button>
    </div>
  </div>

  <script>
    const API_KEY = 'ai_chat_api_url';
    const SYSTEM_PROMPT = `你是軟件中心的 AI 助手，協助學生學習。本軟件包含：字詞地鼠戰、手勢點名、春江花月夜、詩人的朋友圈等教育應用。
請用友善、易懂的方式回答，適宜中小學生理解。可協助解答：語文、詩詞、文言、學習方法、軟件使用等問題。`;

    const apiInput = document.getElementById('apiUrl');
    apiInput.value = localStorage.getItem(API_KEY) || 'http://localhost:3001';
    apiInput.addEventListener('blur', () => localStorage.setItem(API_KEY, apiInput.value));

    let chatHistory = [];

    document.getElementById('testBtn').addEventListener('click', async () => {
      const url = (apiInput.value || '').trim();
      const status = document.getElementById('status');
      if (!url) {
        status.textContent = '請輸入 API 網址';
        status.className = 'status err';
        return;
      }
      status.textContent = '連線中...';
      status.className = 'status';
      try {
        const res = await fetch(url + '/health');
        const data = await res.json();
        if (data.ok && data.hasKey) {
          status.textContent = '✓ 連線成功';
          status.className = 'status ok';
        } else {
          status.textContent = '⚠ 未載入金鑰';
          status.className = 'status err';
        }
      } catch (e) {
        status.textContent = '✗ 連線失敗';
        status.className = 'status err';
      }
    });

    async function send() {
      const input = document.getElementById('userInput');
      const text = (input.value || '').trim();
      if (!text) return;

      const url = (apiInput.value || '').trim();
      if (!url) {
        alert('請先設定 API 網址');
        return;
      }

      const messagesEl = document.getElementById('messages');
      messagesEl.innerHTML += `<div class="msg user"><div class="role">你</div>${escapeHtml(text)}</div>`;
      input.value = '';
      chatHistory.push({ role: 'user', content: text });

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      messagesEl.innerHTML += `<div class="msg assistant" id="loading"><div class="role">AI 助手</div>思考中...</div>`;
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch(url + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system: SYSTEM_PROMPT,
            messages: chatHistory
          })
        });
        const data = await res.json().catch(() => ({}));
        document.getElementById('loading').remove();
        if (!res.ok) {
          throw new Error(data.error || '請求失敗');
        }
        const reply = data.reply || data.content || '';
        chatHistory.push({ role: 'assistant', content: reply });
        messagesEl.innerHTML += `<div class="msg assistant"><div class="role">AI 助手</div>${escapeHtml(reply)}</div>`;
      } catch (e) {
        document.getElementById('loading').remove();
        let msg = e.message || '請確認後端已啟動';
        if (msg.includes('Failed to fetch')) msg = '無法連線，請確認後端已執行 node launch.js';
        messagesEl.innerHTML += `<div class="msg assistant"><div class="role">AI 助手</div>回覆失敗：${escapeHtml(msg)}</div>`;
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
      btn.disabled = false;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('sendBtn').addEventListener('click', send);
    document.getElementById('userInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
